<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #f4f6f9;
}

/* TOP TITLE BAR */
.header {
    width: 100%;
    background: #1e3c72;
    color: white;
    text-align: center;
    padding: 20px;
    font-size: 22px;
    font-weight: bold;
    letter-spacing: 1px;
}

/* LOGIN CARD */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 80vh;
}

.login-box {
    width: 350px;
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0px 5px 20px rgba(0,0,0,0.15);
    text-align: center;
}

/* INPUTS */
input {
    width: 90%;
    padding: 12px;
    margin: 12px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
    font-size: 14px;
}

/* BUTTON */
button {
    width: 95%;
    padding: 12px;
    background: linear-gradient(to right, #00c6ff, #0072ff);
    border: none;
    color: white;
    font-size: 16px;
    border-radius: 6px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    opacity: 0.9;
}

/* SUBTEXT */
.subtitle {
    margin-bottom: 15px;
    color: gray;
    font-size: 14px;
}
</style>

</head>

<body>

<div class="header">
     ROAD DAMAGE DETECTION USING MACHINE LEARNING
</div>

<div class="login-container">
    <div class="login-box">
        <h2>Admin Login</h2>
        <p class="subtitle">Enter your credentials to continue</p>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
    </div>
</div>

</body>
</html>
